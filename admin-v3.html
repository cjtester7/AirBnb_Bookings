<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Serena | Host Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FDF9F4;
    --sand: #E8DFD0;
    --clay: #C4A882;
    --terracotta: #A0704A;
    --espresso: #2C1A0E;
    --bark: #5C3D22;
    --sage: #7A8C6E;
    --text-primary: #2C1A0E;
    --text-secondary: #6B5240;
    --text-muted: #9A8070;
    --success: #3D7A4A;
    --warning: #A07020;
    --danger: #8C3030;
    --info: #2A5A8C;
    --shadow-soft: 0 2px 12px rgba(44,26,14,0.08);
    --radius: 10px;
    --transition: all 0.25s ease;
  }
  [data-theme="dark"] {
    --cream: #1A110A;
    --warm-white: #211610;
    --sand: #2E2018;
    --clay: #7A5E42;
    --terracotta: #C4935A;
    --espresso: #F5EDE0;
    --bark: #D4B48A;
    --text-primary: #F5EDE0;
    --text-secondary: #C4A882;
    --text-muted: #8A7060;
    --success: #5DAA6A;
    --warning: #D4A040;
    --danger: #C05050;
    --info: #5A8CC4;
    --shadow-soft: 0 2px 12px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text-primary); font-weight: 300; min-height: 100vh; }

  /* TOPBAR */
  .topbar {
    background: var(--warm-white); border-bottom: 1px solid var(--sand);
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-primary);
    display: flex; align-items: center; gap: 12px;
  }
  .topbar-subtitle { font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 7px 16px; border-radius: 6px; border: 1px solid var(--sand);
    font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; transition: var(--transition); color: var(--text-secondary);
    background: transparent; text-transform: uppercase;
  }
  .btn:hover { border-color: var(--clay); color: var(--terracotta); }
  .btn-primary { background: var(--terracotta); color: white; border-color: var(--terracotta); }
  .btn-primary:hover { background: var(--bark); border-color: var(--bark); color: white; }
  .theme-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--sand);
    background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--text-muted); transition: var(--transition);
  }
  .theme-btn:hover { border-color: var(--clay); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 60px); }
  .sidebar {
    width: 220px; background: var(--warm-white);
    border-right: 1px solid var(--sand);
    padding: 24px 0; flex-shrink: 0;
  }
  .sidebar-nav { list-style: none; }
  .sidebar-nav li a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 24px; font-size: 13px; letter-spacing: 0.5px;
    color: var(--text-secondary); text-decoration: none;
    transition: var(--transition); border-left: 2px solid transparent;
  }
  .sidebar-nav li a:hover, .sidebar-nav li a.active {
    color: var(--terracotta); background: var(--cream);
    border-left-color: var(--terracotta);
  }
  .sidebar-section {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); padding: 20px 24px 8px;
  }

  /* MAIN */
  .main { flex: 1; padding: 32px; overflow: auto; }
  .page-header { margin-bottom: 28px; }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 300; color: var(--text-primary);
  }
  .page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--warm-white); border: 1px solid var(--sand);
    border-radius: var(--radius); padding: 20px;
  }
  .stat-card-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .stat-card-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 300; color: var(--text-primary); line-height: 1;
  }
  .stat-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* TABLE SECTION */
  .table-section { background: var(--warm-white); border: 1px solid var(--sand); border-radius: var(--radius); overflow: hidden; }
  .table-header {
    padding: 16px 20px; border-bottom: 1px solid var(--sand);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .table-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .table-controls { display: flex; gap: 8px; align-items: center; }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    padding: 5px 10px; border: 1px solid var(--sand); border-radius: 6px;
    background: none; cursor: pointer; font-size: 13px; color: var(--text-muted);
    transition: var(--transition);
  }
  .view-btn.active { background: var(--terracotta); color: white; border-color: var(--terracotta); }
  .search-box {
    padding: 6px 12px; border: 1px solid var(--sand); border-radius: 6px;
    font-family: 'Jost', sans-serif; font-size: 13px; color: var(--text-primary);
    background: var(--cream); outline: none; width: 180px;
    transition: var(--transition);
  }
  .search-box:focus { border-color: var(--clay); }
  .search-box::placeholder { color: var(--text-muted); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 1px solid var(--sand); }
  th {
    padding: 12px 16px; text-align: left; font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted);
    font-weight: 400; white-space: nowrap; cursor: pointer;
    user-select: none; position: relative;
  }
  th:hover { color: var(--terracotta); }
  th .sort-indicator { margin-left: 4px; opacity: 0.4; font-size: 10px; }
  th.sorted { color: var(--terracotta); }
  th.sorted .sort-indicator { opacity: 1; }
  td { padding: 14px 16px; border-bottom: 1px solid var(--sand); color: var(--text-secondary); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--cream); }
  .uuid-cell { font-family: monospace; font-size: 11px; color: var(--text-muted); }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px;
    letter-spacing: 0.5px; font-weight: 500; white-space: nowrap;
  }
  .status-Pending { background: rgba(160,112,74,0.1); color: var(--warning); }
  .status-Confirmed { background: rgba(61,122,74,0.1); color: var(--success); }
  .status-Cancelled { background: rgba(140,48,48,0.1); color: var(--danger); }
  .status-Completed { background: rgba(42,90,140,0.1); color: var(--info); }
  .action-btn {
    padding: 3px 10px; border-radius: 4px; border: 1px solid var(--sand);
    background: none; font-family: 'Jost', sans-serif; font-size: 11px;
    cursor: pointer; transition: var(--transition); color: var(--text-muted);
    letter-spacing: 0.5px; margin-right: 4px;
  }
  .action-btn:hover { border-color: var(--clay); color: var(--terracotta); }

  /* CARD VIEW */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 16px; }
  .booking-card {
    background: var(--cream); border: 1px solid var(--sand);
    border-radius: var(--radius); padding: 20px;
    transition: var(--transition);
  }
  .booking-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-soft); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .card-name { font-size: 15px; font-weight: 400; color: var(--text-primary); }
  .card-uuid { font-family: monospace; font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .card-details { display: flex; flex-direction: column; gap: 6px; }
  .card-row { display: flex; justify-content: space-between; font-size: 12px; }
  .card-row-label { color: var(--text-muted); }
  .card-row-val { color: var(--text-primary); font-weight: 400; }
  .card-actions { display: flex; gap: 6px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--sand); flex-wrap: wrap; }

  /* SETTINGS MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(44,26,14,0.4);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: var(--transition);
  }
  [data-theme="dark"] .modal-overlay { background: rgba(0,0,0,0.6); }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--warm-white); border-radius: var(--radius);
    border: 1px solid var(--sand); padding: 32px;
    width: min(480px, 90vw);
    transform: translateY(12px) scale(0.97);
    transition: var(--transition); box-shadow: var(--shadow-soft);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal h2 { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--sand);
    border-radius: 6px; font-family: 'Jost', sans-serif; font-size: 13px;
    color: var(--text-primary); background: var(--cream); outline: none;
    transition: var(--transition);
  }
  .form-input:focus { border-color: var(--clay); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .conn-result {
    margin-top: 12px; padding: 10px 14px; border-radius: 6px;
    font-size: 13px; display: none;
  }
  .conn-result.success { background: rgba(61,122,74,0.1); color: var(--success); }
  .conn-result.error { background: rgba(140,48,48,0.1); color: var(--danger); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state-text { font-size: 14px; }

  /* LOADING */
  .loading-spinner {
    display: flex; align-items: center; justify-content: center;
    padding: 60px; gap: 10px; color: var(--text-muted); font-size: 13px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--sand);
    border-top-color: var(--terracotta); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .topbar { padding: 0 16px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .search-box { width: 130px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    Casa Serena
    <span class="topbar-subtitle">Host Admin</span>
  </div>
  <div class="topbar-actions">
    <button class="btn" onclick="loadBookings()">↻ Refresh</button>
    <button class="btn" onclick="openSettings()">⚙ Settings</button>
    <a href="index-v1.html" class="btn">← Guest Site</a>
    <button class="theme-btn" onclick="toggleTheme()">☀</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">Manage</div>
    <ul class="sidebar-nav">
      <li><a href="#" class="active" onclick="setPage('bookings')">📋 All Bookings</a></li>
      <li><a href="#" onclick="filterByStatus('Pending')">⏳ Pending</a></li>
      <li><a href="#" onclick="filterByStatus('Confirmed')">✓ Confirmed</a></li>
      <li><a href="#" onclick="filterByStatus('Completed')">★ Completed</a></li>
      <li><a href="#" onclick="filterByStatus('Cancelled')">✕ Cancelled</a></li>
    </ul>
    <div class="sidebar-section">Settings</div>
    <ul class="sidebar-nav">
      <li><a href="#" onclick="openSettings()">⚙ Configuration</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="page-title">Bookings</div>
      <div class="page-subtitle" id="pageSubtitle">Loading...</div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-card-label">Total</div>
        <div class="stat-card-val" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Pending</div>
        <div class="stat-card-val" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Confirmed</div>
        <div class="stat-card-val" id="statConfirmed">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Completed</div>
        <div class="stat-card-val" id="statCompleted">—</div>
      </div>
    </div>

    <div class="table-section">
      <div class="table-header">
        <div class="table-title">All Booking Requests</div>
        <div class="table-controls">
          <input type="text" class="search-box" id="searchBox" placeholder="Search guests..." oninput="filterTable()">
          <div class="view-toggle">
            <button class="view-btn active" id="viewTable" onclick="setView('table')">☰ List</button>
            <button class="view-btn" id="viewCard" onclick="setView('card')">⊞ Cards</button>
          </div>
        </div>
      </div>
      <div id="bookingsContent">
        <div class="loading-spinner"><div class="spinner"></div> Loading bookings...</div>
      </div>
    </div>
  </main>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <div class="form-group">
      <label class="form-label">Apps Script URL</label>
      <input type="text" class="form-input" id="scriptUrl" placeholder="YOUR_GOOGLE_SHEET_URL_HERE">
    </div>
    <div id="connResult" class="conn-result"></div>
    <div class="modal-footer">
      <button class="btn" onclick="testConnection()">Test Connection</button>
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
var APPS_SCRIPT_URL = localStorage.getItem("casaserena_url") || "https://script.google.com/macros/s/AKfycby48XIE2VCFwkIEEqlKz_dSUShg5D_zT1VB1i-tnlt0mXNg-uyA6cam71sc1VaMSHGBxA/exec";

// ============================================================
// STATE
// ============================================================
var allBookings = [];
var currentView = "table";
var sortCol = "Timestamp";
var sortAsc = false;
var statusFilter = "";

// ============================================================
// THEME
// ============================================================
function toggleTheme() {
  var d = document.documentElement;
  var isDark = d.getAttribute("data-theme") === "dark";
  d.setAttribute("data-theme", isDark ? "light" : "dark");
  document.querySelector(".theme-btn").textContent = isDark ? "☀" : "☾";
  localStorage.setItem("theme", isDark ? "light" : "dark");
}
(function() {
  var saved = localStorage.getItem("theme");
  if (saved) {
    document.documentElement.setAttribute("data-theme", saved);
    if (saved === "dark") document.querySelector(".theme-btn").textContent = "☾";
  }
})();

// ============================================================
// LOAD BOOKINGS
// ============================================================
function loadBookings() {
  document.getElementById("bookingsContent").innerHTML = '<div class="loading-spinner"><div class="spinner"></div> Loading bookings...</div>';
  document.getElementById("pageSubtitle").textContent = "Fetching data...";

  fetch(APPS_SCRIPT_URL + "?action=getBookings")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        allBookings = data.bookings || [];
        updateStats();
        renderBookings();
        document.getElementById("pageSubtitle").textContent = allBookings.length + " total booking requests";
      } else {
        showError("Error: " + (data.error || "Unknown error"));
      }
    })
    .catch(function(err) {
      showError("Connection failed. Check your Apps Script URL in Settings.");
      document.getElementById("pageSubtitle").textContent = "Could not load data";
    });
}

function showError(msg) {
  document.getElementById("bookingsContent").innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠</div><div class="empty-state-text">' + msg + '</div></div>';
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  var filtered = statusFilter ? allBookings.filter(function(b) { return b.Status === statusFilter; }) : allBookings;
  document.getElementById("statTotal").textContent = filtered.length;
  document.getElementById("statPending").textContent = allBookings.filter(function(b) { return b.Status === "Pending"; }).length;
  document.getElementById("statConfirmed").textContent = allBookings.filter(function(b) { return b.Status === "Confirmed"; }).length;
  document.getElementById("statCompleted").textContent = allBookings.filter(function(b) { return b.Status === "Completed"; }).length;
}

// ============================================================
// FILTER + SORT
// ============================================================
function getFilteredSorted() {
  var search = (document.getElementById("searchBox").value || "").toLowerCase();
  var list = allBookings.filter(function(b) {
    if (statusFilter && b.Status !== statusFilter) return false;
    if (search && !JSON.stringify(b).toLowerCase().includes(search)) return false;
    return true;
  });
  list.sort(function(a, b) {
    var va = (a[sortCol] || "").toString().toLowerCase();
    var vb = (b[sortCol] || "").toString().toLowerCase();
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
  return list;
}

function filterTable() { renderBookings(); }

function setSort(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  renderBookings();
}

function filterByStatus(status) {
  statusFilter = status;
  document.getElementById("pageSubtitle").textContent = "Showing: " + status;
  renderBookings();
  updateStats();
  // Update sidebar active state
  document.querySelectorAll(".sidebar-nav li a").forEach(function(a) {
    a.classList.remove("active");
    var oc = a.getAttribute("onclick") || "";
    if (oc.includes("filterByStatus") && oc.includes(status)) {
      a.classList.add("active");
    }
  });
}

// ============================================================
// RENDER
// ============================================================
function renderBookings() {
  var data = getFilteredSorted();
  if (currentView === "table") renderTable(data);
  else renderCards(data);
}

function setView(v) {
  currentView = v;
  document.getElementById("viewTable").classList.toggle("active", v === "table");
  document.getElementById("viewCard").classList.toggle("active", v === "card");
  renderBookings();
}

// Format date from ISO string
function formatDate(val) {
  if (!val) return "—";
  var s = val.toString();
  if (s.includes("T")) {
    var parts = s.substring(0, 10).split("-");
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return months[parseInt(parts[1], 10) - 1] + " " + parseInt(parts[2], 10) + ", " + parts[0];
  }
  if (s.match(/^\d{4}-\d{2}-\d{2}$/)) {
    var p = s.split("-");
    var mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return mo[parseInt(p[1], 10) - 1] + " " + parseInt(p[2], 10) + ", " + p[0];
  }
  return s;
}

function formatDateTime(val) {
  if (!val) return "—";
  var s = val.toString();
  if (!s.includes("T")) return formatDate(val);
  try {
    var d = new Date(s);
    var date = d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    var time = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit", hour12: true });
    return date + " " + time;
  } catch(e) { return s; }
}

function renderTable(data) {
  if (data.length === 0) {
    document.getElementById("bookingsContent").innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">No bookings found</div></div>';
    return;
  }
  var cols = [
    { key: "UUID", label: "ID" },
    { key: "Name", label: "Guest" },
    { key: "Email", label: "Email" },
    { key: "CheckIn", label: "Check In" },
    { key: "CheckOut", label: "Check Out" },
    { key: "Guests", label: "Guests" },
    { key: "Timestamp", label: "Requested" },
    { key: "Status", label: "Status" },
    { key: "_actions", label: "Actions" }
  ];

  var html = '<div class="table-wrap"><table><thead><tr>';
  cols.forEach(function(c) {
    if (c.key === "_actions") {
      html += '<th>' + c.label + '</th>';
    } else {
      var arrow = sortCol === c.key ? (sortAsc ? "↑" : "↓") : "↕";
      html += '<th class="' + (sortCol === c.key ? "sorted" : "") + '" onclick="setSort(\'' + c.key + '\')">' + c.label + '<span class="sort-indicator">' + arrow + '</span></th>';
    }
  });
  html += '</tr></thead><tbody>';

  data.forEach(function(b) {
    var uuid = (b.UUID || "").toString();
    html += '<tr>';
    html += '<td class="uuid-cell">' + (uuid.substring(0, 8) || "—") + '</td>';
    html += '<td>' + escHtml(b.Name || "—") + '</td>';
    html += '<td>' + escHtml(b.Email || "—") + '</td>';
    html += '<td>' + formatDate(b.CheckIn) + '</td>';
    html += '<td>' + formatDate(b.CheckOut) + '</td>';
    html += '<td>' + escHtml(b.Guests || "—") + '</td>';
    html += '<td>' + formatDateTime(b.Timestamp) + '</td>';
    html += '<td><span class="status-badge status-' + (b.Status || "Pending") + '">' + (b.Status || "Pending") + '</span></td>';
    html += '<td>';
    ["Confirmed", "Completed", "Cancelled"].forEach(function(s) {
      if (b.Status !== s) {
        html += '<button class="action-btn" onclick="updateStatus(\'' + uuid + '\',\'' + s + '\')">' + s + '</button>';
      }
    });
    html += '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById("bookingsContent").innerHTML = html;
}

function renderCards(data) {
  if (data.length === 0) {
    document.getElementById("bookingsContent").innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">No bookings found</div></div>';
    return;
  }
  var html = '<div class="cards-grid">';
  data.forEach(function(b) {
    var uuid = (b.UUID || "").toString();
    html += '<div class="booking-card">';
    html += '<div class="card-top"><div><div class="card-name">' + escHtml(b.Name || "Unknown Guest") + '</div><div class="card-uuid">' + uuid.substring(0, 12) + '...</div></div>';
    html += '<span class="status-badge status-' + (b.Status || "Pending") + '">' + (b.Status || "Pending") + '</span></div>';
    html += '<div class="card-details">';
    html += '<div class="card-row"><span class="card-row-label">Email</span><span class="card-row-val">' + escHtml(b.Email || "—") + '</span></div>';
    html += '<div class="card-row"><span class="card-row-label">Check In</span><span class="card-row-val">' + formatDate(b.CheckIn) + '</span></div>';
    html += '<div class="card-row"><span class="card-row-label">Check Out</span><span class="card-row-val">' + formatDate(b.CheckOut) + '</span></div>';
    html += '<div class="card-row"><span class="card-row-label">Guests</span><span class="card-row-val">' + escHtml(b.Guests || "—") + '</span></div>';
    html += '<div class="card-row"><span class="card-row-label">Requested</span><span class="card-row-val">' + formatDateTime(b.Timestamp) + '</span></div>';
    if (b.Message) html += '<div class="card-row"><span class="card-row-label">Note</span><span class="card-row-val" style="font-size:11px">' + escHtml(b.Message) + '</span></div>';
    html += '</div><div class="card-actions">';
    ["Confirmed", "Completed", "Cancelled"].forEach(function(s) {
      if (b.Status !== s) html += '<button class="action-btn" onclick="updateStatus(\'' + uuid + '\',\'' + s + '\')">' + s + '</button>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById("bookingsContent").innerHTML = html;
}

// ============================================================
// UPDATE STATUS
// ============================================================
function updateStatus(uuid, status) {
  fetch(APPS_SCRIPT_URL + "?action=updateStatus&uuid=" + encodeURIComponent(uuid) + "&status=" + encodeURIComponent(status))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        // Update local state and reload view
        allBookings.forEach(function(b) {
          if ((b.UUID || "").toString() === uuid) b.Status = status;
        });
        updateStats();
        renderBookings();
      } else {
        alert("Error updating status: " + (data.error || "Unknown error"));
      }
    })
    .catch(function() { alert("Connection error. Please try again."); });
}

// ============================================================
// SETTINGS
// ============================================================
function openSettings() {
  document.getElementById("scriptUrl").value = APPS_SCRIPT_URL;
  document.getElementById("settingsModal").classList.add("open");
  document.getElementById("connResult").style.display = "none";
}
function closeSettings() { document.getElementById("settingsModal").classList.remove("open"); }
function saveSettings() {
  APPS_SCRIPT_URL = document.getElementById("scriptUrl").value.trim();
  localStorage.setItem("casaserena_url", APPS_SCRIPT_URL);
  closeSettings();
  loadBookings();
}

function testConnection() {
  var url = document.getElementById("scriptUrl").value.trim();
  var result = document.getElementById("connResult");
  result.style.display = "block";
  result.className = "conn-result";
  result.textContent = "Testing connection...";

  fetch(url + "?action=testConnection")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        result.className = "conn-result success";
        result.textContent = "Connected! Sheet: " + data.sheetName + " (" + data.rows + " rows)";
      } else {
        result.className = "conn-result error";
        result.textContent = "Error: " + (data.error || "Unknown error");
      }
    })
    .catch(function() {
      result.className = "conn-result error";
      result.textContent = "Connection failed. Check the URL and ensure the script is deployed.";
    });
}

function escHtml(s) {
  return (s || "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function setPage(p) {
  statusFilter = "";
  document.getElementById("pageSubtitle").textContent = allBookings.length + " total booking requests";
  updateStats();
  renderBookings();
  // Update sidebar active state
  document.querySelectorAll(".sidebar-nav li a").forEach(function(a) {
    a.classList.remove("active");
    var oc = a.getAttribute("onclick") || "";
    if (oc.includes("setPage")) a.classList.add("active");
  });
}

// ============================================================
// INIT
// ============================================================
window.addEventListener("DOMContentLoaded", function() {
  if (APPS_SCRIPT_URL !== "YOUR_GOOGLE_SHEET_URL_HERE") {
    loadBookings();
  } else {
    document.getElementById("bookingsContent").innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚙</div><div class="empty-state-text">Configure your Apps Script URL in Settings to get started.</div></div>';
    document.getElementById("pageSubtitle").textContent = "Not configured";
  }
});
</script>
